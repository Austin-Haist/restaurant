<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <form action="" method="">
            <label for="first-name">First Name:</label>
            <input type="text" id="first-name"/>
            <label for="last-name">Last Name:</label>
            <input type="text" id="last-name"/>
            <input type="submit" value="Submit"/>
        </form>

        <p>Select your favorite Programming Language:</p>
        <form>
            <label for="java">Java</label>
            <input type="radio" id="java" name="language" value="java"/>
            <label for="python">Python</label>
            <input type="radio" id="python" name="language" value="python"/>
            <label for="c_plus_plus">C++</label>
            <input type="radio" id="c++" name="language" value="c_plus"/>
        </form>

        <p>Select the options that apply to you:</p>
        <form>
            <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike"/>
            <label for="vehicle1">I have a bike</label>
            <input type="checkbox" id="vehicle2" name="vehicle2" value="Car"/>
            <label for="vehicle2">I have a car</label>
            <input type="checkbox" id="vehicle3" name="vehicle3" value="Boat"/>
            <label for="vehicle3">I have a boat</label>
        </form>

        <p>Related elements inside a form</p>
        <form>
            <fieldset>
                <legend>Personal Information</legend>
                <label for="first-name">First Name:</label>
                <input type="text" id="first-name"/>
                <label for="last-name">Last Name:</label>
                <input type="text" id="last-name"/>
            </fieldset>
            <fieldset>
                <legend>Vehicles</legend>
                <label for="cars">Choose a car:</label>
                <select id="cars" name="cars">
                    <option value="volvo">Volvo</option>
                    <option value="saab">Saab</option>
                    <option value="mercedes">Mercedes</option>
                    <option value="audi">Audi</option>
                </select>
            </fieldset>
            <fieldset>
                <legend>Additional Information</legend>
                <label for="suggestions">Suggestions:</label>
                <textarea id="Suggestions" name="Suggestions"></textarea>
            </fieldset>
            <fieldset>
                <legend>User Information:</legend>
                <label for="username">Username:</label>
                <input type="text" id="username"/>
                <label for="password">Password:</label>
                <input type="password" id="password"/>
                <label for="birthday">Birthday:</label>
                <input type="date" id="birthday"/>
                <label for="age">Age:</label>
                <input type="number" id="age"/>
            </fieldset>
        </form>
    </div>
</body>
</html>
